<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Cognitive-science corpus — PDF viewer</title>
<style>
  :root{
    --bg:#f7f5f0; --panel:#fffdf8; --ink:#222019; --muted:#6b655a;
    --line:#e3ddd0; --accent:#7a5c3e; --accent-soft:#efe7da; --badge:#cdbfa8;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 6px 24px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font:16px/1.5 "Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    color:var(--ink);background:var(--bg);
    -webkit-text-size-adjust:100%;
  }
  /* ---------- layout ---------- */
  #app{display:flex;flex-direction:column;height:100%;}
  header{
    display:flex;align-items:center;gap:14px;padding:12px 18px;
    background:var(--panel);border-bottom:1px solid var(--line);box-shadow:var(--shadow);
    position:sticky;top:0;z-index:20;
  }
  header .brand{font-weight:700;font-size:18px;letter-spacing:.2px;white-space:nowrap;}
  header .brand small{display:block;font-size:11px;font-weight:400;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}
  .searchwrap{flex:1;display:flex;gap:8px;align-items:center;max-width:720px;}
  .searchwrap input{
    flex:1;font:inherit;font-size:15px;padding:9px 13px;border:1px solid var(--line);
    border-radius:10px;background:#fff;color:var(--ink);min-width:0;
  }
  .searchwrap input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);}
  .btn{
    font:inherit;font-size:14px;padding:9px 14px;border:1px solid var(--line);border-radius:10px;
    background:var(--accent);color:#fff;cursor:pointer;white-space:nowrap;
  }
  .btn.secondary{background:#fff;color:var(--accent);}
  .btn:active{transform:translateY(1px);}
  main{flex:1;display:flex;min-height:0;}
  /* ---------- catalog ---------- */
  #catalog{
    width:38%;max-width:520px;min-width:280px;border-right:1px solid var(--line);
    overflow-y:auto;background:var(--panel);-webkit-overflow-scrolling:touch;
  }
  #catalog .meta{padding:10px 16px;color:var(--muted);font-size:13px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);}
  .row{padding:11px 16px;border-bottom:1px solid var(--line);cursor:pointer;}
  .row:hover{background:var(--accent-soft);}
  .row.active{background:var(--accent-soft);box-shadow:inset 3px 0 0 var(--accent);}
  .row .title{font-weight:600;font-size:15px;}
  .row .sub{font-size:13px;color:var(--muted);margin-top:2px;}
  .row .tags{margin-top:4px;display:flex;gap:6px;flex-wrap:wrap;}
  .tag{font-size:10.5px;letter-spacing:.4px;text-transform:uppercase;color:#5a503f;background:var(--accent-soft);border:1px solid var(--badge);border-radius:6px;padding:1px 6px;}
  .tag.sim{background:#e6efe6;border-color:#bcd3bc;color:#3d5a3d;}
  .tag.pdf{background:#efe2e2;border-color:#d8b8b8;color:#7a3e3e;}
  /* ---------- reader ---------- */
  #reader{flex:1;overflow-y:auto;padding:0;background:var(--bg);-webkit-overflow-scrolling:touch;position:relative;}
  #welcome{padding:48px 36px;max-width:640px;margin:0 auto;color:var(--muted);}
  #welcome h1{color:var(--ink);font-size:30px;margin:0 0 6px;}
  #welcome p{font-size:16px;}
  .readhead{position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--line);padding:14px 22px;z-index:10;box-shadow:var(--shadow);}
  .readhead h2{margin:0;font-size:20px;}
  .readhead .byline{color:var(--muted);font-size:14px;margin-top:3px;}
  .modetabs{margin-top:10px;display:flex;gap:8px;}
  .modetabs button{font:inherit;font-size:13px;padding:6px 13px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;color:var(--accent);}
  .modetabs button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .modetabs button:disabled{opacity:.4;cursor:not-allowed;}
  #content{padding:26px 32px;max-width:760px;margin:0 auto;font-size:18px;line-height:1.72;white-space:pre-wrap;}
  #pdfpages{padding:18px;display:flex;flex-direction:column;align-items:center;gap:14px;}
  #pdfpages canvas{max-width:100%;height:auto;box-shadow:var(--shadow);background:#fff;border-radius:2px;}
  .pdfbar{display:flex;gap:10px;align-items:center;justify-content:center;color:var(--muted);font-size:13px;padding:6px;}
  /* ---------- annotations ---------- */
  #annos{border-top:1px solid var(--line);background:var(--panel);padding:18px 32px;max-width:760px;margin:18px auto 40px;border-radius:12px;box-shadow:var(--shadow);}
  #annos h3{margin:0 0 12px;font-size:15px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);}
  .anno{border-left:3px solid var(--accent);padding:6px 0 6px 14px;margin-bottom:14px;}
  .anno .q{font-style:italic;color:#3f3a30;}
  .anno .c{margin-top:4px;}
  .anno .loc{font-size:12px;color:var(--muted);margin-top:4px;}
  .anno.pin{border-left-color:#b08a3e;}
  .anno.kindle{border-left-color:#5a7a5a;}
  .empty{color:var(--muted);font-style:italic;}
  /* ---------- loading / states ---------- */
  .spin{display:inline-block;width:15px;height:15px;border:2px solid var(--badge);border-top-color:var(--accent);border-radius:50%;animation:s .8s linear infinite;vertical-align:-2px;}
  @keyframes s{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#332e25;color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;z-index:50;box-shadow:var(--shadow);max-width:90%;}
  /* ---------- responsive (iPad portrait / phone) ---------- */
  #backBtn{display:none;}
  @media (max-width:820px){
    main{position:relative;}
    #catalog{width:100%;max-width:none;}
    #reader{display:none;position:absolute;inset:0;background:var(--bg);}
    body.reading #catalog{display:none;}
    body.reading #reader{display:block;}
    #backBtn{display:inline-block;}
    #content{font-size:17px;padding:20px;}
  }
  /* ---------- tag tabs ---------- */
  #tabbar{position:sticky;top:0;z-index:5;display:flex;flex-wrap:wrap;gap:6px;padding:9px 12px;background:var(--panel);border-bottom:1px solid var(--line);}
  .tab{font:inherit;font-size:11.5px;line-height:1.2;padding:4px 9px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted);cursor:pointer;white-space:nowrap;}
  .tab:hover{border-color:var(--accent);color:var(--ink);}
  .tab.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .tab .c{margin-left:5px;opacity:.65;font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">Research Library<small>private</small></div>
    <button id="backBtn" class="btn secondary" onclick="showCatalog()">‹ List</button>
    <div class="searchwrap">
      <input id="q" type="search" placeholder="Filter by title or author…" autocomplete="off">
      <button class="btn" id="semBtn" onclick="semanticSearch()">Search meaning</button>
    </div>
    <a class="btn secondary" href="./datm.html" title="DATM topic map">Topic map ↗</a>
  </header>
  <main>
    <section id="catalog"><div id="tabbar"></div><div id="catlist"><div class="meta"><span class="spin"></span> Loading…</div></div></section>
    <section id="reader">
      <div id="welcome">
        <h1>The library</h1>
        <p>Browse on the left, or type in the box to filter by title and author. “Search meaning” finds texts by what they’re about, not just their words. Tap any item to read it — full text, the original PDF, and the margin notes already taken on it.</p>
      </div>
    </section>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
/* ============================ config ============================ */
const SUPABASE_URL = 'https://zknmvifnbrycjwckkggy.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inprbm12aWZuYnJ5Y2p3Y2trZ2d5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3MDIzNzksImV4cCI6MjA4NTI3ODM3OX0.V0zYcLjJTm41ZH4ILydjfGTfb9xksPJix7KPsKmLkwI';
const SEMANTIC_FN = SUPABASE_URL + '/functions/v1/semantic-search';
const PDF_BUCKET = 'pdf-library';
const TONIGHT_SUBCATS = ["Analogical reasoning, transfer & retrieval", "Computational models & structure-mapping", "Metaphor & figurative language", "Relational reasoning & similarity", "Development of analogy", "Neuroscience of analogy & relational reasoning", "Analogy in science & education", "Case-based reasoning & AI", "Philosophy & theory of analogy", "Conceptual metaphor theory", "Embodiment & grounded metaphor", "Neuroscience of metaphor", "Metaphor development & atypical populations", "Multimodal, gesture & visual metaphor", "Computational metaphor (NLP)", "Metaphor in discourse, culture & politics", "Metaphor, metonymy & blending (theory)", "Metaphor in science & education", "Metaphor comprehension & processing", "Tai Chi, qigong & internal martial arts", "Enactive & embodied (4E) cognition", "Embodied metaphor & image schema", "Metaphor, analogy & imagery in motor learning", "Somatic & contemplative movement practices", "Motor skill, expertise & perception–action", "Polanyi & the epistemology of tacit knowing", "Nonaka, SECI & knowledge creation", "Situated learning & communities of practice", "Apprenticeship, craft & embodied skill", "Knowledge transfer across firms & organizations", "Knowledge sharing, ICT & codification", "Tacit knowledge in education & the professions", "Expertise, intuition & measurement", "Innovation, regions & knowledge spillovers"];
const TABLES = ['journal_articles','books','book_chapters','edited_volumes','literary_texts'];
const SELECT_COLS = 'file_name,title,author,year,category,subcategory,word_count,has_pdf,storage_path';

const sb = supabase.createClient(SUPABASE_URL, ANON_KEY);
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let CATALOG = [];          // unified list of all texts
let byKey = new Map();     // file_name -> record
let activeKey = null;

/* ============================ load catalogue ============================ */
async function loadCatalog(){
  try{
    CATALOG = [];
    const CORPUS_CATS = ['Cognitive Science','Tai Chi & Embodied Cognition','Tacit Knowledge','Cognitive Science (expanded)'];
    for(const cat of CORPUS_CATS){
      for(let off=0; ; off+=1000){
        const res = await sb.from('journal_articles').select(SELECT_COLS)
          .eq('category', cat).order('title').range(off, off+999);
        if(res.error){ throw res.error; }
        (res.data||[]).forEach(r => { r.tbl='journal_articles'; CATALOG.push(r); byKey.set(r.file_name, r); });
        if(!res.data || res.data.length < 1000) break;
      }
    }
    CATALOG.sort((a,b)=>(a.author||a.title||'').localeCompare(b.author||b.title||''));
    renderTabs(); applyView();
    const _dl=location.hash.match(/doc=([^&]+)/); if(_dl){ const _fn=decodeURIComponent(_dl[1]); if(byKey.has(_fn)) openText(_fn); }
  }catch(e){
    document.getElementById('catalog').innerHTML =
      '<div class="meta">Could not load the library. '+
      'If this persists, the database read policy may not be enabled yet.<br><br>'+esc(e.message||e)+'</div>';
  }
}

/* ============================ render catalogue ============================ */
const PRETTY = {journal_articles:'Article',books:'Book',book_chapters:'Chapter',edited_volumes:'Volume',literary_texts:'Literary'};
function renderList(items, label){
  const cat = document.getElementById('catlist');
  if(!items.length){ cat.innerHTML='<div class="meta">No matches.</div>'; return; }
  const head = '<div class="meta">'+(label||(items.length+' of '+CATALOG.length+' texts'))+'</div>';
  const rows = items.map(r=>{
    const yr = r.year ? ' · '+r.year : '';
    const sim = r._sim!=null ? '<span class="tag sim">'+(Math.round(r._sim*100))+'% match</span>' : '';
    const pdf = r.has_pdf ? '<span class="tag pdf">PDF</span>' : '';
    return '<div class="row" data-k="'+esc(r.file_name)+'" onclick="openText(this.dataset.k)">'+
      '<div class="title">'+ital(esc(r.title||r.file_name))+'</div>'+
      '<div class="sub">'+esc(r.author||'—')+yr+'</div>'+
      '<div class="tags"><span class="tag">'+PRETTY[r.tbl]+'</span>'+
        (r.category?'<span class="tag">'+esc(r.category)+'</span>':'')+pdf+sim+'</div>'+
      '</div>';
  }).join('');
  cat.innerHTML = head + rows;
  if(activeKey){ const el=cat.querySelector('[data-k="'+cssEsc(activeKey)+'"]'); if(el) el.classList.add('active'); }
}

/* ============================ filter (instant, client-side) ============================ */
let filterTimer;
document.getElementById('q').addEventListener('input', ()=>{ clearTimeout(filterTimer); filterTimer = setTimeout(applyView, 120); });
let activeTag = null;
const CAT_TABS = [['Cognitive Science','Analogy & Metaphor'],['Tai Chi & Embodied Cognition','Embodiment & Tai-chi'],['Tacit Knowledge','Tacit Knowledge'],['Cognitive Science (expanded)','Broader net (OA)']];
function renderTabs(){
  const bar = document.getElementById('tabbar'); if(!bar) return;
  const counts = {}; CATALOG.forEach(r=>{ counts[r.category]=(counts[r.category]||0)+1; });
  let html = '<button class="tab '+(activeTag==null?'on':'')+'" data-t="">All<span class="c">'+CATALOG.length+'</span></button>';
  html += CAT_TABS.map(([c,l])=> '<button class="tab '+(activeTag===c?'on':'')+'" data-t="'+esc(c)+'">'+esc(l)+'<span class="c">'+(counts[c]||0)+'</span></button>').join('');
  bar.innerHTML = html;
  bar.querySelectorAll('.tab').forEach(b=> b.onclick=()=>{ activeTag = b.dataset.t || null; renderTabs(); applyView(); });
}
function applyView(){
  const q = (document.getElementById('q').value||'').trim().toLowerCase();
  let items = CATALOG;
  if(activeTag) items = items.filter(r=> (r.category||'')===activeTag);
  if(q) items = items.filter(r=> (r.title||'').toLowerCase().includes(q) || (r.author||'').toLowerCase().includes(q) || (r.category||'').toLowerCase().includes(q));
  renderList(items, (activeTag? esc(activeTag)+' · ' : '') + items.length + ' of ' + CATALOG.length);
}

/* ============================ semantic search ============================ */
async function semanticSearch(){
  const q = document.getElementById('q').value.trim();
  if(!q){ toast('Type what you want to find, then “Search meaning”.'); return; }
  const btn = document.getElementById('semBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>';
  try{
    const res = await fetch(SEMANTIC_FN, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+ANON_KEY},
      body: JSON.stringify({ query:q, match_count:30 })
    });
    if(!res.ok) throw new Error('search service returned '+res.status);
    const out = await res.json();
    const ranked = (out.results||out||[]).map(m=>{
      const rec = byKey.get(m.file_name) || m;
      return Object.assign({}, rec, {_sim:m.similarity});
    });
    if(!ranked.length){ toast('No semantic matches.'); }
    renderList(ranked, ranked.length+' texts about “'+esc(q)+'”, by meaning');
  }catch(e){
    toast('Semantic search isn’t available yet ('+esc(e.message)+'). Plain filtering still works.');
  }finally{
    btn.disabled = false; btn.textContent = 'Search meaning';
  }
}

/* ============================ open a text ============================ */
async function openText(key){
  activeKey = key;
  document.querySelectorAll('.row.active').forEach(el=>el.classList.remove('active'));
  const rowEl = document.querySelector('[data-k="'+cssEsc(key)+'"]'); if(rowEl) rowEl.classList.add('active');
  document.body.classList.add('reading');
  const rec = byKey.get(key);
  const reader = document.getElementById('reader');
  reader.scrollTop = 0;
  reader.innerHTML =
    '<div class="readhead">'+
      '<h2>'+ital(esc(rec.title||rec.file_name))+'</h2>'+
      '<div class="byline">'+esc(rec.author||'—')+(rec.year?' · '+rec.year:'')+' · '+esc(rec.subcategory||PRETTY[rec.tbl])+'</div>'+
    '</div>'+
    '<div id="pdfwrap"><div class="pdfbar" id="pdfbar"></div><div id="pdfpages"></div></div>';
  renderPdf(rec);
}

function showMode(m){
  const isText = m==='text';
  document.getElementById('content').style.display = isText?'block':'none';
  document.getElementById('pdfwrap').style.display = isText?'none':'block';
  document.getElementById('tabText').classList.toggle('on', isText);
  document.getElementById('tabPdf').classList.toggle('on', !isText);
  if(!isText && !pdfLoadedFor){ renderPdf(byKey.get(activeKey)); }
}

/* ---- text body (content column) ---- */
async function loadTextBody(rec){
  const el = document.getElementById('content');
  try{
    const { data, error } = await sb.from(rec.tbl).select('content').eq('file_name', rec.file_name).single();
    if(error) throw error;
    el.textContent = (data && data.content) ? data.content : '(No plain-text content stored. Try the PDF tab.)';
  }catch(e){
    el.innerHTML = '<span class="empty">Could not load text ('+esc(e.message)+'). Try the PDF tab.</span>';
  }
}

/* ---- pdf ---- */
let pdfLoadedFor = null;
async function renderPdf(rec){
  pdfLoadedFor = rec.file_name;
  const bar = document.getElementById('pdfbar');
  const pages = document.getElementById('pdfpages');
  pages.innerHTML=''; bar.innerHTML='<span class="spin"></span> Fetching PDF…';
  try{
    // resolve storage path then a signed URL (3600s), matching the desktop app
    const { data:meta, error:me } = await sb.from(rec.tbl).select('storage_path').eq('file_name', rec.file_name).single();
    if(me) throw me;
    if(!meta || !meta.storage_path) throw new Error('no storage_path on this record');
    const { data:urlData, error:ue } = await sb.storage.from(PDF_BUCKET).createSignedUrl(meta.storage_path, 3600);
    if(ue) throw ue;
    const buf = await (await fetch(urlData.signedUrl)).arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    if(pdfLoadedFor !== rec.file_name) return; // user switched away
    bar.textContent = pdf.numPages + ' pages';
    const scale = (window.devicePixelRatio||1) * (window.innerWidth<820?1.1:1.4);
    for(let n=1; n<=pdf.numPages; n++){
      const page = await pdf.getPage(n);
      const vp = page.getViewport({scale});
      const c = document.createElement('canvas');
      c.width = vp.width; c.height = vp.height;
      c.style.width = (vp.width/(window.devicePixelRatio||1))+'px';
      pages.appendChild(c);
      await page.render({ canvasContext:c.getContext('2d'), viewport:vp }).promise;
      if(pdfLoadedFor !== rec.file_name) return;
    }
  }catch(e){
    bar.innerHTML=''; pages.innerHTML = '<div class="empty">Could not load the PDF ('+esc(e.message)+'). '+
      'The storage read policy may not be enabled yet.</div>';
  }
}

/* ---- annotations (READ-ONLY) ---- */
async function loadAnnotations(rec){
  const box = document.getElementById('annos');
  try{
    const [a1, a2] = await Promise.all([
      sb.from('library_annotations').select('quote,page_num,pinned,comment,created_at').eq('text_file_name', rec.file_name),
      sb.from('annotations').select('page_number,passage_ref,annotation_text').eq('text_file_name', rec.file_name)
    ]);
    const notes = (a1.data||[]).map(a=>({
      kind: a.pinned?'pin':'note', quote:a.quote, page:a.page_num, comment:a.comment, t:a.created_at
    }));
    const margin = (a2.data||[]).map(a=>({
      kind:'kindle', quote:a.passage_ref, page:a.page_number, comment:a.annotation_text
    }));
    const all = notes.concat(margin);
    let html = '<h3>Notes on this text</h3>';
    if(!all.length){ html += '<div class="empty">No notes recorded on this text.</div>'; }
    else{
      html += all.map(a=>{
        const loc = a.page!=null ? 'p. '+a.page : (a.kind==='pin'?'pinned note':'');
        return '<div class="anno '+(a.kind==='pin'?'pin':a.kind==='kindle'?'kindle':'')+'">'+
          (a.quote?'<div class="q">“'+esc(a.quote)+'”</div>':'')+
          (a.comment?'<div class="c">'+esc(a.comment)+'</div>':'')+
          (loc?'<div class="loc">'+esc(loc)+(a.kind==='kindle'?' · margin note':'')+'</div>':'')+
          '</div>';
      }).join('');
    }
    box.innerHTML = html;
  }catch(e){
    box.innerHTML = '<h3>Notes on this text</h3><div class="empty">Could not load notes ('+esc(e.message)+').</div>';
  }
}

/* ============================ helpers ============================ */
function showCatalog(){ document.body.classList.remove('reading'); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
// render _underscored_ title spans as italics (input already escaped)
function ital(s){ return String(s).replace(/_([^_]+)_/g,'<i>$1</i>'); }
function cssEsc(s){ return String(s).replace(/["\\]/g,'\\$&'); }
let toastTimer;
function toast(msg){
  let t=document.querySelector('.toast'); if(!t){ t=document.createElement('div'); t.className='toast'; document.body.appendChild(t); }
  t.textContent=msg; clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.remove(),4200);
}

loadCatalog();
</script>
</body>
</html>
